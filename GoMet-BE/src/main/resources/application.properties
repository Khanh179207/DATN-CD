spring.application.name=GoMet-BE

# Default to the local dev profile unless an explicit active profile is provided.
spring.profiles.default=${SPRING_PROFILES_DEFAULT:dev}

spring.datasource.url=${DB_URL:jdbc:sqlserver://localhost:1433;databaseName=DATN_CD;encrypt=true;trustServerCertificate=true}
spring.datasource.username=${DB_USERNAME:sa}
spring.datasource.password=${DB_PASSWORD:123123}
spring.datasource.driver-class-name=com.microsoft.sqlserver.jdbc.SQLServerDriver

# ─── JPA / Hibernate ────────────────────────────────────────────────────────
# ddl-auto is profile-specific:
# - dev  -> update
# - prod -> validate
spring.jpa.hibernate.naming.physical-strategy=org.hibernate.boot.model.naming.PhysicalNamingStrategyStandardImpl
spring.jpa.open-in-view=false

# ─── Flyway (production migrations) ─────────────────────────────────────────
# Enabled: Flyway runs V1/V2 idempotent SQL on startup.
# baseline-on-migrate: treats existing schema (pre-Flyway) as version 0.
spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=true
spring.flyway.baseline-version=0
spring.flyway.locations=classpath:db/migration
spring.flyway.validate-on-migrate=false

# ─── File upload ─────────────────────────────────────────────────────────────
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=20MB
spring.servlet.multipart.max-request-size=25MB

# ─── App config ──────────────────────────────────────────────────────────────
app.base-url=http://localhost:8080
app.frontend.url=${FRONTEND_URL:http://localhost:5173}
app.allowed-origins=${ALLOWED_ORIGINS:http://localhost:5173,http://localhost:5174,http://127.0.0.1:5173}

# ─── JWT ─────────────────────────────────────────────────────────────────────
# CHANGE IN PRODUCTION: generate with `openssl rand -hex 64`
jwt.secret=${JWT_SECRET:00112233445566778899aabbccddeeff00112233445566778899aabbccddeeff00112233445566778899aabbccddeeff00112233445566778899aabbccddeeff}
# Access token lifetime: 1 hour (increase to reduce tab-switching re-auth)
jwt.access-token-ttl-seconds=3600
# Refresh token lifetime: 7 days
jwt.refresh-token-ttl-seconds=604800

# ─── MFA / TOTP ──────────────────────────────────────────────────────────────
# AES-256 key (32 bytes = 64 hex chars) for encrypting TOTP secrets at rest.
# CHANGE IN PRODUCTION: generate with `openssl rand -hex 32`
mfa.encryption-key=${MFA_ENCRYPTION_KEY:0123456789abcdef0123456789abcdef0123456789abcdef0123456789abcdef}
mfa.issuer=GoMet

# ─── Rate Limiting ────────────────────────────────────────────────────────────
# Max failed login attempts before lockout
security.max-failed-attempts=5
# Lockout duration in seconds (exponential: attempt * this value)
security.lockout-base-seconds=30
# Hard max lockout: 1 hour
security.max-lockout-seconds=3600

# ─── Spring Mail (Gmail SMTP) ────────────────────────────────────────────────
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${SMTP_USERNAME:}
spring.mail.password=${SMTP_PASSWORD:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true
spring.mail.properties.mail.smtp.ssl.trust=smtp.gmail.com
spring.mail.properties.mail.smtp.connectiontimeout=5000
spring.mail.properties.mail.smtp.timeout=5000
spring.mail.properties.mail.smtp.writetimeout=5000

# ─── Google Sign-In ──────────────────────────────────────────────────────────
# Required for "Continue with Google" OAuth login.
# Steps:
#   1. Go to https://console.cloud.google.com/apis/credentials
#   2. Create an OAuth 2.0 Client ID (Web application type)
#   3. Add http://localhost:8080 to "Authorized redirect URIs" (if needed)
#   4. Set GOOGLE_CLIENT_ID env var or replace the placeholder below.
# WARNING: If left empty, Google token audience is NOT verified (dev only).
google.client.id=${GOOGLE_CLIENT_ID:401311784032-029uak749a8sehhb6gfedg2b6dm9k1lm.apps.googleusercontent.com}

# ─── Redis ───────────────────────────────────────────────────────────────────
spring.data.redis.host=${REDIS_HOST:localhost}
spring.data.redis.port=${REDIS_PORT:6379}
spring.data.redis.password=${REDIS_PASSWORD:}
spring.data.redis.timeout=3s

# ─── Logging ─────────────────────────────────────────────────────────────────
logging.level.org.springframework.security=WARN
logging.level.poly.edu.service=INFO
logging.config=classpath:logback-spring.xml

# ─── Admin Email Rate Limiting ───────────────────────────────────────────────
# Max email job queues per admin per day
admin.email.rate.daily=100
# Max email job queues per admin per minute
admin.email.rate.minute=20

# Max new posts per user within the rate-limit window
spam.post.max-per-user=3
# Max new posts per IP within the rate-limit window
spam.post.max-per-ip=5
# Window duration in minutes
spam.post.window-minutes=10
# Number of approved posts required for "trusted user" relaxed limits
spam.post.trusted-approved-threshold=10
