spring.application.name=GoMet-BE
spring.devtools.restart.enabled=false

# Default to the local dev profile unless an explicit active profile is provided.
spring.profiles.default=${SPRING_PROFILES_DEFAULT:dev}

spring.datasource.url=${DB_URL:jdbc:sqlserver://localhost:1433;databaseName=DATN_CD;encrypt=true;trustServerCertificate=true}
spring.datasource.username=${DB_USERNAME:sa}
spring.datasource.password=${DB_PASSWORD:123123}
spring.datasource.driver-class-name=com.microsoft.sqlserver.jdbc.SQLServerDriver

# ddl-auto is profile-specific:
# - dev  -> update
# - prod -> validate
spring.jpa.hibernate.naming.physical-strategy=org.hibernate.boot.model.naming.PhysicalNamingStrategyStandardImpl
spring.jpa.open-in-view=false

# Flyway runs idempotent migrations on startup.
spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=true
spring.flyway.baseline-version=0
spring.flyway.locations=classpath:db/migration
spring.flyway.validate-on-migrate=false

spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=20MB
spring.servlet.multipart.max-request-size=25MB

app.base-url=http://localhost:8080
app.frontend.url=${FRONTEND_URL:http://localhost:5173}
app.allowed-origins=${ALLOWED_ORIGINS:http://localhost:5173,http://localhost:5174,http://127.0.0.1:5173}

jwt.secret=${JWT_SECRET:00112233445566778899aabbccddeeff00112233445566778899aabbccddeeff00112233445566778899aabbccddeeff00112233445566778899aabbccddeeff}
jwt.access-token-ttl-seconds=3600
jwt.refresh-token-ttl-seconds=604800

mfa.encryption-key=${MFA_ENCRYPTION_KEY:0123456789abcdef0123456789abcdef0123456789abcdef0123456789abcdef}
mfa.issuer=GoMet

security.max-failed-attempts=5
security.lockout-base-seconds=30
security.max-lockout-seconds=3600

spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${SMTP_USERNAME:}
spring.mail.password=${SMTP_PASSWORD:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true
spring.mail.properties.mail.smtp.ssl.trust=smtp.gmail.com
spring.mail.properties.mail.smtp.connectiontimeout=5000
spring.mail.properties.mail.smtp.timeout=5000
spring.mail.properties.mail.smtp.writetimeout=5000

google.client.id=${GOOGLE_CLIENT_ID:401311784032-029uak749a8sehhb6gfedg2b6dm9k1lm.apps.googleusercontent.com}

spring.data.redis.host=${REDIS_HOST:localhost}
spring.data.redis.port=${REDIS_PORT:6379}
spring.data.redis.password=${REDIS_PASSWORD:}
spring.data.redis.timeout=3s

logging.level.org.springframework.security=WARN
logging.level.poly.edu.service=INFO
logging.config=classpath:logback-spring.xml

admin.email.rate.daily=100
admin.email.rate.minute=20

spam.post.max-per-user=3
spam.post.max-per-ip=5
spam.post.window-minutes=10
spam.post.trusted-approved-threshold=10

cloudinary.cloud-name=${CLOUDINARY_CLOUD_NAME:}
cloudinary.api-key=${CLOUDINARY_API_KEY:}
cloudinary.api-secret=${CLOUDINARY_API_SECRET:}
