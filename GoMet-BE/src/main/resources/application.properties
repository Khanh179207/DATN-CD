spring.application.name=GoMet-BE

spring.datasource.url=jdbc:sqlserver://localhost:1433;databaseName=DATN_CD;encrypt=true;trustServerCertificate=true
spring.datasource.username=sa
spring.datasource.password=123
spring.datasource.driver-class-name=com.microsoft.sqlserver.jdbc.SQLServerDriver

# ─── JPA / Hibernate ────────────────────────────────────────────────────────
# 'update' keeps Hibernate auto-DDL for development convenience.
# In production: set to 'validate' and rely solely on Flyway migrations.
spring.jpa.hibernate.naming.physical-strategy=org.hibernate.boot.model.naming.PhysicalNamingStrategyStandardImpl
spring.jpa.hibernate.ddl-auto=update

# ─── Flyway (production migrations) ─────────────────────────────────────────
# Enabled: Flyway runs V1/V2 idempotent SQL on startup.
# baseline-on-migrate: treats existing schema (pre-Flyway) as version 0.
spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=true
spring.flyway.baseline-version=0
spring.flyway.locations=classpath:db/migration
spring.flyway.validate-on-migrate=false

# ─── File upload ─────────────────────────────────────────────────────────────
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=20MB
spring.servlet.multipart.max-request-size=25MB

# ─── App config ──────────────────────────────────────────────────────────────
app.base-url=http://localhost:8080
app.frontend.url=http://localhost:5173
app.allowed-origins=http://localhost:5173,http://localhost:5174,http://127.0.0.1:5173

# ─── JWT ─────────────────────────────────────────────────────────────────────
# CHANGE IN PRODUCTION: generate with `openssl rand -hex 64`
jwt.secret=${JWT_SECRET:00112233445566778899aabbccddeeff00112233445566778899aabbccddeeff00112233445566778899aabbccddeeff00112233445566778899aabbccddeeff}
# Access token lifetime: 1 hour (increase to reduce tab-switching re-auth)
jwt.access-token-ttl-seconds=3600
# Refresh token lifetime: 7 days
jwt.refresh-token-ttl-seconds=604800

# ─── MFA / TOTP ──────────────────────────────────────────────────────────────
# AES-256 key (32 bytes = 64 hex chars) for encrypting TOTP secrets at rest.
# CHANGE IN PRODUCTION: generate with `openssl rand -hex 32`
mfa.encryption-key=${MFA_ENCRYPTION_KEY:0123456789abcdef0123456789abcdef0123456789abcdef0123456789abcdef}
mfa.issuer=GoMet

# ─── Rate Limiting ────────────────────────────────────────────────────────────
# Max failed login attempts before lockout
security.max-failed-attempts=5
# Lockout duration in seconds (exponential: attempt * this value)
security.lockout-base-seconds=30
# Hard max lockout: 1 hour
security.max-lockout-seconds=3600

